spring:
  application:
    name: churchhub-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/churchhub}
    username: ${DB_USERNAME:churchhub}
    password: ${DB_PASSWORD:churchhub}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-use-a-long-random-base64-or-plain-secret-key-min-32-bytes}
    access-expiration: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  superadmin:
    email: ${SUPERADMIN_EMAIL:admin@churchhub.local}
    password: ${SUPERADMIN_PASSWORD:}
    full-name: ${SUPERADMIN_FULL_NAME:Super Admin}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
